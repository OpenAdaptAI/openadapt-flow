# Dedicated mypy config for the `interop` CI job (see .github/workflows/ci.yml).
#
# Why separate from pyproject's [tool.mypy]: this job is the ONLY one that
# installs the real `openadapt-types` (the `interop` extra), so it is the only
# place mypy can resolve the canonical Action/ActionTarget/ActionResult models
# that openadapt_flow/interop/types.py maps onto. Those models are pydantic v2,
# so mypy needs the pydantic plugin to understand their `Field(default=...)`
# signatures -- without it, every optional field (node_id/modifiers/drag_end/
# raw) is a false-positive "missing named argument". The plugin is enabled ONLY
# here rather than globally so the whole-package `lint` / `mypy-strict-safety`
# jobs keep their current (plugin-free) behavior unchanged.
[mypy]
python_version = 3.10
plugins = pydantic.mypy
# Optional heavy extras (numpy-backed vision, grounding, capture, …) are
# imported lazily by openadapt_flow.ir's transitive deps and have no stubs.
ignore_missing_imports = true
# Analyze imported modules for types but never report THEIR (pre-existing debt)
# errors here -- this job gates the shim only.
follow_imports = silent

# numpy 2.x ships stubs using 3.12-only `type` syntax that crash mypy under the
# 3.10 target; skip following into it (mirrors pyproject's override).
[mypy-numpy.*]
follow_imports = skip
follow_imports_for_stubs = true
