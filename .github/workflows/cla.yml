name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      # Requires the founder to create a repo/org secret PERSONAL_ACCESS_TOKEN
      # with access to the signatures repo/branch below, OR to install the hosted
      # CLA Assistant GitHub App instead of this workflow. See CONTRIBUTING.md.
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/OpenAdaptAI/openadapt-flow/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],bot*'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
