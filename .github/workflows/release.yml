name: Release and PyPI Publish

# Two explicit paths, both dispatched from protected main:
#   semantic-release   -> Python Semantic Release coalesces the Conventional
#                         Commits since the last tag, versions, tags, and
#                         publishes to PyPI (OIDC) + GitHub Releases.
#   publish-existing-ref -> build & publish an existing ref/tag to PyPI
#                           (recovery, e.g. when a tag exists but publish failed).
#
# Releases are deliberately not triggered by every merge. Maintainers can merge
# a reviewed train, require green protected-main CI plus an explicitly
# dispatched full Python/OS matrix on the exact candidate SHA, and publish one
# coherent version only after its source and artifact boundaries are complete.
#
# Prerequisites (repo/org settings): secrets.ADMIN_TOKEN (org-level, visibility
# "all") to push the release commit/tag past branch protection; PyPI Trusted
# Publishing for openadapt-flow with environment "pypi".
#
# Supply chain: GitHub Actions below are pinned to full commit SHAs (not mutable
# tags) with the human-readable version in a trailing comment; Dependabot
# (.github/dependabot.yml) proposes SHA bumps. Follow-up (settings change, not
# code): the org-wide ADMIN_TOKEN (visibility "all") should become a
# repo-scoped fine-grained token or GitHub App to narrow its blast radius.

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Release operation"
        type: choice
        required: true
        default: semantic-release
        options:
          - semantic-release
          - publish-existing-ref
      ref:
        description: "Tag or ref to build and publish to PyPI (e.g. v0.4.0)"
        required: false
        default: main

jobs:
  # ---- Coalesced semantic release, explicitly dispatched ------------------
  auto-release:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.operation == 'semantic-release' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: release
    environment: pypi
    permissions:
      actions: read # inspect exact-head full-matrix CI before publishing
      id-token: write # PyPI Trusted Publishing (OIDC)
      contents: write # push the version bump commit + tag, create the Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Skip the release commit itself (avoid a loop)
        id: check_skip
        run: |
          author="$(git log -1 --pretty=format:'%an')"
          subject="$(git log -1 --pretty=format:'%s')"
          if [ "$author" = "semantic-release" ] || printf '%s' "$subject" | grep -q '^chore: release'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for exact-head full-matrix qualification
        if: steps.check_skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/check_release_ci.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --wait-seconds 2700 \
            --poll-seconds 10

      - name: Set up Python
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      # Semantic Release computes the version, synchronizes the editable root
      # lock entry, builds both distributions, then commits and tags. The build
      # command installs its own pinned uv inside the action's Python 3.14
      # container and deliberately avoids resolving the runtime lock there
      # because Flow supports Python 3.10-3.12.
      - name: Python Semantic Release
        if: steps.check_skip.outputs.skip != 'true'
        id: release
        uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e # v10.6.1
        with:
          github_token: ${{ secrets.ADMIN_TOKEN }}

      - name: Publish to PyPI
        if: steps.check_skip.outputs.skip != 'true' && steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

      - name: Publish GitHub Release
        if: steps.check_skip.outputs.skip != 'true' && steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@5a5718ce47b892ef699f2972dae122297771d641 # v10.6.1
        with:
          github_token: ${{ secrets.ADMIN_TOKEN }}

  # ---- Manual / recovery publish of an existing ref ----------------------
  manual-publish:
    # Always run the current protected-main workflow as the guard. The target
    # artifact ref is checked out separately below.
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.operation == 'publish-existing-ref' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      actions: read # require exact-target full-matrix CI before publishing
      contents: read # resolve the requested ref and protected-main guard
      id-token: write # PyPI Trusted Publishing (OIDC)

    steps:
      - name: Checkout the requested ref
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          path: target

      - name: Checkout the current protected-main release guard
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          path: guard

      - name: Resolve and authorize requested ref
        id: target
        working-directory: target
        run: |
          target_sha="$(git rev-parse HEAD)"
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$target_sha" origin/main; then
            echo "Refusing to publish a ref that is not contained in protected main."
            exit 1
          fi
          echo "sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Require successful exact-target full-matrix qualification
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          python3 guard/scripts/check_release_ci.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$TARGET_SHA"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build package
        working-directory: target
        run: |
          rm -rf dist
          uv build --wheel --sdist
          python scripts/check_release_consistency.py --require-dist

      - name: Independently validate publication artifacts
        run: |
          python guard/scripts/check_release_consistency.py \
            --validate-dist-dir target/dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: target/dist/
