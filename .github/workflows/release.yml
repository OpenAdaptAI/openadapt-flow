name: Release and PyPI Publish

# Two paths:
#   push to main       -> Python Semantic Release auto-versions from Conventional
#                         Commits (feat -> minor, fix/perf -> patch), tags, and
#                         publishes to PyPI (OIDC) + GitHub Releases.
#   workflow_dispatch  -> build & publish an existing ref/tag to PyPI (manual /
#                         recovery, e.g. when a tag was created but the publish
#                         step failed).
#
# Prerequisites (repo/org settings): secrets.ADMIN_TOKEN (org-level, visibility
# "all") to push the release commit/tag past branch protection; PyPI Trusted
# Publishing for openadapt-flow with environment "pypi".
#
# Supply chain: GitHub Actions below are pinned to full commit SHAs (not mutable
# tags) with the human-readable version in a trailing comment; Dependabot
# (.github/dependabot.yml) proposes SHA bumps. Follow-up (settings change, not
# code): the org-wide ADMIN_TOKEN (visibility "all") should become a
# repo-scoped fine-grained token or GitHub App to narrow its blast radius.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build and publish to PyPI (e.g. v0.4.0)"
        required: true

jobs:
  # ---- Auto-release on merge to main -------------------------------------
  auto-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: release
    environment: pypi
    permissions:
      actions: read # inspect the exact-head CI run before publishing
      id-token: write # PyPI Trusted Publishing (OIDC)
      contents: write # push the version bump commit + tag, create the Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Skip the release commit itself (avoid a loop)
        id: check_skip
        run: |
          author="$(git log -1 --pretty=format:'%an')"
          subject="$(git log -1 --pretty=format:'%s')"
          if [ "$author" = "semantic-release" ] || printf '%s' "$subject" | grep -q '^chore: release'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for exact-head CI
        if: steps.check_skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          deadline=$((SECONDS + 2700))
          while [ "$SECONDS" -lt "$deadline" ]; do
            response="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
                --raw-field head_sha="${GITHUB_SHA}" \
                --raw-field event=push \
                --raw-field per_page=20
            )"
            status="$(
              printf '%s' "$response" |
                jq -r --arg sha "$GITHUB_SHA" \
                  '[.workflow_runs[] | select(.head_sha == $sha)]
                   | sort_by(.created_at) | last | .status // "missing"'
            )"
            conclusion="$(
              printf '%s' "$response" |
                jq -r --arg sha "$GITHUB_SHA" \
                  '[.workflow_runs[] | select(.head_sha == $sha)]
                   | sort_by(.created_at) | last | .conclusion // "pending"'
            )"
            echo "Exact-head CI for ${GITHUB_SHA}: ${status}/${conclusion}"
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                exit 0
              fi
              echo "Refusing to publish because exact-head CI concluded ${conclusion}."
              exit 1
            fi
            sleep 10
          done
          echo "Refusing to publish: exact-head CI did not succeed within 45 minutes."
          exit 1

      - name: Set up Python
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Semantic Release computes the version, synchronizes the editable root
      # lock entry, builds both distributions, then commits and tags. The build
      # command installs its own pinned uv inside the action's Python 3.14
      # container and deliberately avoids resolving the runtime lock there
      # because Flow supports Python 3.10-3.12.
      - name: Python Semantic Release
        if: steps.check_skip.outputs.skip != 'true'
        id: release
        uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e # v10.6.1
        with:
          github_token: ${{ secrets.ADMIN_TOKEN }}

      - name: Publish to PyPI
        if: steps.check_skip.outputs.skip != 'true' && steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Publish GitHub Release
        if: steps.check_skip.outputs.skip != 'true' && steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@5a5718ce47b892ef699f2972dae122297771d641 # v10.6.1
        with:
          github_token: ${{ secrets.ADMIN_TOKEN }}

  # ---- Manual / recovery publish of an existing ref ----------------------
  manual-publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)

    steps:
      - name: Checkout the requested ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
