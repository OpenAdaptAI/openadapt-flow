name: Release and PyPI Publish

# Two paths:
#   push to main       -> Python Semantic Release auto-versions from Conventional
#                         Commits (feat -> minor, fix/perf -> patch), tags, and
#                         publishes to PyPI (OIDC) + GitHub Releases.
#   workflow_dispatch  -> build & publish an existing ref/tag to PyPI (manual /
#                         recovery, e.g. when a tag was created but the publish
#                         step failed).
#
# Prerequisites (repo/org settings): secrets.ADMIN_TOKEN (org-level, visibility
# "all") to push the release commit/tag past branch protection; PyPI Trusted
# Publishing for openadapt-flow with environment "pypi".

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build and publish to PyPI (e.g. v0.4.0)"
        required: true

jobs:
  # ---- Auto-release on merge to main -------------------------------------
  auto-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: release
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
      contents: write # push the version bump commit + tag, create the Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Skip the release commit itself (avoid a loop)
        id: check_skip
        run: |
          author="$(git log -1 --pretty=format:'%an')"
          subject="$(git log -1 --pretty=format:'%s')"
          if [ "$author" = "semantic-release" ] || printf '%s' "$subject" | grep -q '^chore: release'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.check_skip.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v4

      # Semantic Release computes the version, bumps pyproject, tags, AND runs
      # `build_command` (uv build) to populate dist/. There is deliberately no
      # separate build step — a second `uv build` would collide on dist/*.tar.gz.
      - name: Python Semantic Release
        if: steps.check_skip.outputs.skip != 'true'
        id: release
        uses: python-semantic-release/python-semantic-release@v9.15.2
        with:
          github_token: ${{ secrets.ADMIN_TOKEN }}

      - name: Publish to PyPI
        if: steps.check_skip.outputs.skip != 'true' && steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish GitHub Release
        if: steps.check_skip.outputs.skip != 'true' && steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v9.15.2
        with:
          github_token: ${{ secrets.ADMIN_TOKEN }}

  # ---- Manual / recovery publish of an existing ref ----------------------
  manual-publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)

    steps:
      - name: Checkout the requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
