# claims.yaml — the machine-readable maturity-claim registry.
#
# WHY THIS FILE EXISTS
# --------------------
# Every public maturity claim about openadapt-flow ("web is supported today",
# "Windows has scoped acceptance") must be a FUNCTION of automated
# evidence, not a hand-written adjective that quietly rots. This registry maps
# each claim -> a maturity `tier` -> the specific backing test(s)/benchmark(s)
# that prove it. `scripts/validate_claims.py` enforces the tier<->evidence
# contract in CI and regenerates `docs/VERIFICATION.md` from it.
#
# THE CONTRACT (enforced by scripts/validate_claims.py)
# -----------------------------------------------------
# Evidence strength is derived from the repo, not asserted here:
#   * a test file with NO module-level env skipif, that exists      -> "supported"
#     (it actually runs, and can be green, in CI)
#   * a test file gated by a module-level `pytestmark` env skipif    -> "validating"
#     (opt-in / infra-gated: grounded, but never runs on default CI)
#   * a doc / benchmark artifact (.md or a benchmark dir)            -> "roadmap"
#     (design/《field》 evidence; cannot by itself prove a running capability)
# A claim FAILS the gate when its `tier` OUTRANKS its strongest evidence
# (rank order research < roadmap < validating < supported). Additionally a
# claim carrying `reproducibility: field` may NOT be tier `supported` (a
# result that is not CI-reproducible is never presented as "supported").
#
# TIERS
#   supported  — CI-proven today on the default (non-opt-in) suite.
#   validating — grounded in a REAL opt-in/infra-gated proof or a field test;
#                being validated (incl. with design partners). NOT "supported".
#   roadmap    — designed/specified, not yet proven by a running test.
#   research   — open question / study.
#
# EVIDENCE ENTRY FIELDS
#   path   — repo-relative path to a test file, benchmark dir, or doc. MUST exist.
#   proves — what THIS artifact actually demonstrates (honest scope).
#   kind   — optional: test | benchmark | doc. Inferred when omitted
#            (tests/**/*.py -> test, *.md -> doc, else -> benchmark).
#   node   — optional: a `def <name>` that must exist in `path` (rot guard).
#
# The gate detects opt-in gating from each test's source (a module-level
# `pytestmark` skipif on an env var) — the registry cannot lie about it.

version: 1

claims:
  # ------------------------------------------------------------------ web
  - id: web-supported
    claim: >-
      Web (browser) workflows are supported today: record a GUI workflow once,
      then replay it deterministically and locally.
    surfaces: [README.md, website, docs]
    tier: supported
    evidence:
      - path: tests/e2e/test_record_compile_replay.py
        proves: >-
          Records the MockMed browser demo once, compiles it, and replays it
          under baseline + theme/move/rename drift and parameter substitution
          through the headless-browser Backend.
      - path: tests/test_mockmed.py
        proves: >-
          The reference browser demo app and its drift screens render
          deterministically (no CSS transitions), so replay is repeatable.
      - path: tests/test_replayer.py
        proves: >-
          The deterministic replayer resolves steps, substitutes parameters,
          enforces postconditions and the risk gate — no model in the loop.
    caveats:
      - >-
        "Supported" is scoped to the reference headless-browser backend in this
        registry. Desktop and remote-display workflows use the separately scoped
        acceptance and design-partner claims below.
      - >-
        The full record->compile->replay e2e runs in the post-merge/nightly
        full suite; the fast required PR gate covers the replayer + demo units.

  # -------------------------------------------------- deterministic $0 replay
  - id: deterministic-zero-model-replay
    claim: >-
      Replay is deterministic, local, and $0 — zero model calls on either the
      record or the replay side.
    surfaces: [README.md, website, docs]
    tier: supported
    evidence:
      - path: tests/e2e/test_record_compile_replay.py
        proves: >-
          Baseline replay x3 resolves every step on the `template` rung with 0
          heals and 0 model calls; healed bundles replay clean afterward.
      - path: tests/test_replayer.py
        proves: >-
          The replayer is a deterministic resolution ladder; the VLM rung is a
          fallback, not on the default path — the core runtime is model-free.
      - path: benchmark/BENCHMARK.md
        kind: benchmark
        proves: >-
          CI-reproducible MockMed run artifact: 100/100 compiled replays at
          4.9s p50 with zero model calls (field/artifact reference).
    caveats:
      - >-
        A VLM rung exists as the lowest fallback of the ladder; it is not
        invoked on a clean deterministic replay, and never on the record side.

  # ---------------------------------------------- effect verification / writes
  - id: effect-verification-silent-writes
    claim: >-
      Effect verification against the system of record catches silent wrong
      writes the screen-only oracle misses (5 of 7 transactional fault classes).
    surfaces: [README.md, docs]
    tier: supported
    evidence:
      - path: tests/test_effect_verifier.py
        proves: >-
          The REST/FHIR/document-hash verifiers confirm exactly-one write and
          refute duplicate / missing / partial / collateral-loss writes.
      - path: tests/test_silent_wrong_action_benchmark.py
        proves: >-
          Each silent-wrong-action class is silent under the screen-only oracle
          and is CAUGHT once effects are declared and verified.
      - path: tests/test_effect_fhir.py
        proves: >-
          The FHIR effect verifier's read/confirm/refute/indeterminate contract
          (the live-OpenEMR smoke is a separate opt-in function in this file).
      - path: benchmark/fault_model/FAULT_MODEL.md
        kind: benchmark
        proves: >-
          The 7-class transactional fault-model study: 5/7 classes silently
          mishandled by screen-only, all 5 halt through the real replayer.
    caveats:
      - >-
        Verification requires the step to DECLARE typed `effects` AND a
        configured EffectVerifier. Without a real system-of-record verifier,
        on-screen read-back is SAME-SURFACE and not independent.

  - id: effect-verifier-kit
    claim: >-
      The effect-verifier kit makes declaring and wiring effect verification a
      reviewed deployment-config exercise instead of bespoke per-deployment
      code: declarative REST / FHIR / read-only-SQL / file-arrival /
      document-hash verifier configs with secret-isolated auth references and
      explicit run-parameter binding, a cross-substrate exactly-one-NEW-record
      duplicate guard, per-consequential-step effect-coverage lint/certify
      gates, and typed reconciliation tasks on halt.
    surfaces: [docs]
    tier: validating
    evidence:
      - path: tests/test_effect_sql.py
        proves: >-
          The read-only SQL verifier's whitelist (mutation/stacking/comment
          smuggling refused at construction) and full verdict contract, plus
          the exact table-delta audit promoted from the Frappe Lending
          reference matrix — against LOCAL sqlite fixtures only.
      - path: tests/test_effect_file_arrival.py
        proves: >-
          File-arrival verdicts (pattern / size>0 / mtime freshness / content
          probe / duplicate export) against real temp directories, and the
          SFTP path against an in-memory fake paramiko-shaped transport.
      - path: tests/test_effect_kit_config.py
        proves: >-
          The declarative construction path: env-var auth references fail
          loud when unset, run-parameter references resolve at build (and
          refuse to construct unresolved), and pre-kit configs build
          byte-identically.
      - path: tests/test_effect_coverage_lint.py
        proves: >-
          lint warns per consequential step lacking an effect contract and
          reports coverage %; certify fails the same gap only when the policy
          sets require_effects_for_irreversible (warn-vs-fail is
          policy-configurable).
      - path: tests/test_effect_reconciliation.py
        proves: >-
          Every escalated verification failure emits a typed
          ReconciliationTask carrying the one-way contract hash and verdict
          evidence — never the resolved selector values.
      - path: docs/EFFECT_KIT.md
        proves: >-
          The operator-facing kit contract: config reference plus Frappe
          (REST/SQL) and OpenEMR (FHIR/SQL) worked examples targeting the
          reference fixtures.
    caveats:
      - >-
        CONTRACT-PROVEN, not live-proven: the SQL verifier is exercised
        against sqlite fixtures (no production MariaDB/Postgres), the SFTP
        arrival path against a fake transport (no real SFTP server), and the
        worked-example configs are templates — only the FHIR substrate has an
        additional opt-in live-OpenEMR test. Per-verifier claims are exactly
        as strong as these tests.

  # --------------------------------------------------- identity gate / halt
  - id: identity-gate-halt-armed
    claim: >-
      On ambiguity the runtime halts instead of guessing, and an identity gate
      refuses a wrong-entity (wrong-patient) click — on ARMED steps only.
    surfaces: [README.md, docs]
    tier: supported
    evidence:
      - path: tests/test_identity.py
        proves: >-
          Wrong-entity / near-name sibling / generic-band / param-in-band
          probes: the identity check refuses to verify a mismatched target and
          never arms on non-discriminative bands.
      - path: tests/test_disambiguation.py
        proves: >-
          Underdetermined targets surface as explicit disambiguation rather
          than a guessed click.
      - path: tests/test_identity_fuzz.py
        proves: >-
          Public property-based checks preserve the never-false-accept
          invariant for collapsible identifiers while requiring clean
          identifiers to remain verifiable.
      - path: tests/test_identity_ladder.py
        proves: >-
          The identity resolution ladder (structural/template/OCR) escalation.
    caveats:
      - >-
        Identity verification covers ONLY armed steps. Real bundles arm a
        MINORITY of clicks (4 of 12 on a recent live OpenEMR bundle); an
        UNARMED click proceeds with no identity check whatsoever. Coverage is
        an auditable per-step metric, but disclosure does not close the gap.

  # -------------------------- compiler-emitted identifier crops (pixel tier)
  - id: identifier-crop-compile-emission
    claim: >-
      The compiler emits a pixel identifier crop (anchor.identifier_crop) for
      identity-armed steps without structured identity — and for any step whose
      identifying region is marked at record time (--identifier) — so the
      pixel-compare identity tier arms on remote-display/pixel replays; every
      crop-less identity-applicable step records an explicit degrade reason,
      and lint surfaces per-bundle pixel-identity coverage.
    surfaces: [docs]
    tier: supported
    evidence:
      - path: tests/test_compile_identifier_crop.py
        proves: >-
          Synthetic-fixture proof of the emission mechanism: a pixel-only
          recording compiles WITH a crop under templates/identifiers/ (sealed
          + manifest-hashed like every image crop); a structured recording
          writes NO identity pixels and records why; explicit --identifier
          markings (event rect / meta region) win; encrypted save seals the
          crop and the sealed crop still reaches the tier; the compiled crop
          drives a wrong-MRN MISMATCH through the real replayer ladder while
          pixel VERIFY stays hard-gated off (zero-false-accept preserved).
      - path: tests/test_identifier_crop_lint.py
        proves: >-
          Lint coverage surfacing: identity-armed steps with vs without crops
          (missing_identifier_crop findings carry the compiler's degrade
          reason; warn on band-only identity, info under structured identity).
    caveats:
      - >-
        Mechanism proven on synthetic fixtures and the bundled demo app only —
        this does NOT re-qualify any desktop/remote-display substrate, and the
        pixel tier remains MISMATCH-or-ABSTAIN (it can add a safe halt on a
        wrong identifier, never authorize a match; PIXEL_VERIFY_ENABLED stays
        off pending a jitter-robust distance).
      - >-
        Automatic emission requires an OCR-readable identity band at compile
        time; icon-only or unreadable rows still compile crop-less (with the
        recorded reason) and fall back to the OCR band tier at replay.

  # ------------------------------------------------ halt -> teach -> promote
  - id: halt-teach-promote
    claim: >-
      A halt is learnable: halt -> teach a correction -> promote a guarded
      branch, refusing underdetermined fixes.
    surfaces: [README.md, docs]
    tier: supported
    evidence:
      - path: tests/test_halt_learn_loop.py
        proves: >-
          A surprise modal halts and emits a learnable trace; teaching promotes
          a guarded dismiss branch that replays without regression; an
          underdetermined correction is refused.
      - path: tests/test_teach_cli.py
        proves: >-
          The `teach` CLI resolves a halt via a correction spec or a recording,
          refuses an underdetermined fix, and errors on a non-halted run.
    caveats:
      - >-
        Promotion is governed by a regression gate that blocks identity-
        weakening corrections; the loop refuses to guess when the fix is
        underdetermined.

  # ------------------------------------------- MockMed benchmark (CI-reprod.)
  - id: mockmed-benchmark-ci-reproducible
    claim: >-
      The MockMed benchmark is CI-reproducible: compiled replay finishes ~4.9s
      p50 with zero model calls versus ~37.5s p50 (~$0.27/run) for the agent.
    surfaces: [README.md, docs]
    tier: supported
    evidence:
      - path: tests/test_mockmed.py
        proves: >-
          The MockMed app + drift screens are deterministic and reachable, the
          substrate the benchmark replays against.
      - path: tests/test_benchmark.py
        proves: >-
          The benchmark harness / report accounting that produces the numbers.
      - path: benchmark/BENCHMARK.md
        kind: benchmark
        proves: >-
          Full numbers, methodology, and caveats for the CI-reproducible
          MockMed comparison (dated run artifact).
    caveats:
      - >-
        The published latency/cost figures come from a dated run artifact; the
        app is intentionally simple, so success rate (100/100 vs 20/20) is not
        the story — the standing cost/latency delta is. Agent cost is a
        list-price estimate.

  # ------------------------------ Windows desktop (validating, opt-in gated)
  - id: windows-desktop-validating
    claim: >-
      Windows UIA has scoped acceptance: the deterministic structural rung
      delivered native actions in a fixed WinForms workflow with independent
      effects and fail-closed stale/ambiguity refusal.
    surfaces: [README.md, docs, website]
    tier: validating
    evidence:
      - path: tests/e2e/test_parallels_desktop_e2e.py
        proves: >-
          OPT-IN live proof on a real Win11-ARM VM: record->compile->replay
          through WindowsBackend with the structural rung resolving every click
          by AutomationId (armed_coverage == 1.0).
      - path: tests/test_windows_backend.py
        proves: >-
          The 4-method Backend protocol on Windows against a MOCKED WAA server
          (runs in CI post-merge; proves the wire, not a live desktop).
      - path: benchmark/structural_action/STRUCTURAL_ACTION.md
        kind: benchmark
        proves: >-
          Desktop drift benchmark: the structural rung resolved 21/21 targets
          where visual replay alone managed 6/21.
      - path: benchmark/windows_uia/results.json
        kind: benchmark
        proves: >-
          Accepted candidate 20260717-candidate-56759c8-v2: 3/3 exact task and
          SQLite effects, 12 UIA receipts, and 3/3 stale plus 3/3 ambiguity
          refusals with zero silent incorrect success, over-halt, or model calls.
    caveats:
      - >-
        The live desktop e2e is OPT-IN and infra-gated (needs a Parallels
        Win11-ARM VM; `OAFLOW_PARALLELS_E2E=1`); it never runs on default CI.
        Only the mocked backend protocol runs in CI.
      - >-
        Acceptance covers the named in-tree workflow and exact Windows VM.
        Third-party applications require workflow-specific qualification.

  # ------------------------------- Native macOS (scoped field acceptance)
  - id: macos-native-validating
    claim: >-
      Native macOS has scoped acceptance for exact-window-bound text delivery,
      independent file effects, and ambiguity refusal on a fixed TextEdit task.
    surfaces: [README.md, docs, website]
    tier: validating
    reproducibility: field
    evidence:
      - path: tests/test_macos_backend.py
        proves: >-
          CI covers unique-window binding, foreground/focus proof, exact-element
          text delivery, and refusal before physical input when proof fails.
      - path: tests/test_macos_qualification.py
        proves: >-
          CI validates the qualification oracle, failure taxonomy, evidence
          hashes, cleanup adjudication, and ambiguity-refusal accounting.
      - path: benchmark/macos_native/textedit_counted_3plus1_b1b61a5_20260717.adjudication.json
        kind: benchmark
        proves: >-
          Candidate b1b61a5 completed 3/3 exact-byte TextEdit effects and
          refused two ambiguous windows without modifying either file.
    caveats:
      - >-
        Acceptance covers TextEdit on one macOS 15.7.3 Apple Silicon host and
        active user session; each customer application is qualified separately.
      - >-
        The original counted report remains failed. The hash-bound adjudication
        accepts only its independently confirmed action/effect/refusal evidence.

  # -------------------------- Native Linux AT-SPI (qualification implementation)
  - id: linux-native-validating
    claim: >-
      Native Linux uses an exact-window AT-SPI backend with complete candidate
      enumeration, native action delivery, and fail-closed ambiguity, staleness,
      and Wayland portal boundaries.
    surfaces: [README.md, docs]
    tier: validating
    evidence:
      - path: tests/test_linux_backend.py
        proves: >-
          Default CI covers exact app/window binding, bounded candidate
          enumeration, ambiguity and stale-target refusal, native invoke/focus
          and editable-text delivery, window-scoped capture, physical-input
          opt-in, and Wayland portal refusal through an injected Linux client.
      - path: tests/test_linux_qualification.py
        proves: >-
          Default CI enforces the live qualification's fixed three-trial
          matrix, independent exact-file and absence oracles, and separate
          silent-incorrect-success, over-halt, and refusal-failure accounting.
      - path: scripts/qualify_linux_atspi.py
        kind: benchmark
        proves: >-
          The required linux-atspi-x11 job drives the real GTK3 fixture through
          AT-SPI on an isolated Xvfb display and session D-Bus, emitting a
          per-trial JSON evidence artifact.
      - path: docs/desktop/LINUX_NATIVE.md
        kind: doc
        proves: >-
          The operator contract, X11 and Wayland boundaries, configuration,
          delivery-only receipt semantics, and required real GTK/AT-SPI CI
          qualification contract.
    caveats:
      - >-
        Required CI establishes live scoped acceptance only for the in-tree
        GTK3 application on its isolated Xvfb image. Each third-party
        application and environment requires its own qualification.
      - >-
        X11 is the initial built-in live transport. Wayland requires a real
        operator-approved XDG RemoteDesktop/ScreenCast portal session; the
        built-in client currently refuses rather than pretending a grant exists.

  # ----------------------------------------- RDP (scoped field acceptance)
  - id: rdp-validating
    claim: >-
      RDP has scoped acceptance for real-network framebuffer decode and input
      delivery into Windows 11 with independent exact file-effect verification.
    surfaces: [README.md, docs, website]
    tier: validating
    reproducibility: field
    evidence:
      - path: tests/e2e/test_parallels_rdp_e2e.py
        proves: >-
          Opt-in snapshot-safe real RDP qualification harness with exactly three
          trials, independent guest-tools oracle, failure taxonomy, and cleanup.
      - path: tests/test_rdp_backend.py
        proves: >-
          CI covers the backend/transport contract, framebuffer conversion,
          pointer and keyboard delivery, and record-compile-replay conformance.
      - path: benchmark/rdp/results_82a658a_20260718.sanitized.json
        kind: benchmark
        proves: >-
          Candidate 82a658a passed 3/3 at 51.845, 10.467, and 7.477 seconds,
          with zero failures, silent incorrect successes, over-halts, or model calls.
    caveats:
      - >-
        Acceptance covers the named 1280x800 Windows Run/file task and exact VM
        environment, not arbitrary applications, identity policies, or Citrix.

  # ------------------------------ Desktop recording via the CLI (validating)
  - id: desktop-recording-validating
    claim: >-
      The product CLI records desktop workflows through openadapt-capture and
      `record --backend windows|rdp` captures the operator's real demonstration
      and emits the compile-ready recording format, so
      record -> compile -> replay closes on the desktop substrate, not just the
      browser.
    surfaces: [README.md, docs, website]
    tier: validating
    evidence:
      - path: tests/test_desktop_record.py
        proves: >-
          The live-capture orchestration + CLI wiring (record --backend
          windows|rdp -> openadapt-capture -> convert_capture), and that a
          desktop-shaped recording COMPILES into a bundle and REPLAYS to
          completion through the desktop backend path, resolving each click to
          its recorded target (runs on default CI).
      - path: tests/test_capture_adapter.py
        proves: >-
          The capture->recording bridge over a REAL openadapt-capture session
          (its own event-processing pipeline + frame extraction) feeding the
          UNMODIFIED compiler (runs on default CI: the `test` job installs the
          `capture` extra; openadapt-capture >=0.5.4 imports clean headless).
      - path: docs/desktop/RECORDING.md
        kind: doc
        proves: >-
          The capture-assisted and live-observer paths, fail-closed secret
          handling, RDP coordinate binding, and reuse of
          openadapt-capture + the capture adapter.
    caveats:
      - >-
        Offline capture carries NO structural (UIA AutomationId) locator, so
        replay uses the visual ladder (template/ocr/geometry). The live capture
        needs a display (openadapt-capture is the optional `capture` extra); the
        CI proof covers a real on-disk capture session -> convert -> compile ->
        replay, not a live recorder run (the live recorder has its own
        integration suite in the openadapt-capture repo).
      - >-
        `--secret` is refused on an unqualified pixel/desktop capture with no
        field geometry, and RDP recording uses the replay pixel space or a
        deployment-calibrated client-window mapping.

  # ------------------------------- Citrix pixel-only (validating, opt-in gated)
  - id: citrix-pixel-validating
    claim: >-
      Citrix uses the governed pixel-only remote-display contract and enters
      design-partner qualification in the customer's exact ICA/HDX application,
      with identity, ambiguity refusal, and independent effects above the driver.
    surfaces: [README.md, docs, website]
    tier: validating
    evidence:
      - path: tests/e2e/test_citrix_pixel_e2e.py
        proves: >-
          OPT-IN pixel-only proof: structural_armed_coverage == 0, replay
          resolves on template/ocr/geometry only, on-screen OCR read-back
          verifies the write, the identity gate HALTs on a look-alike patient,
          and render drift triggers halt-on-ambiguity.
      - path: tests/test_pixel_identity_probe.py
        proves: >-
          The pixel-substrate identity probe behind the on-pixels identity gate.
      - path: docs/desktop/CITRIX_PIXEL.md
        kind: doc
        proves: >-
          The Citrix driver model, reusable evidence, design-partner acceptance
          contract, independent-effect boundary, and customer-controlled posture.
    caveats:
      - >-
        PIXEL-ONLY: no UIA/DOM crosses to the driver. On-screen OCR read-back is
        SAME-SURFACE, not an independent system-of-record check.
      - >-
        A Parallels VM window is a Citrix ANALOG; real HDX/latency/DPI/lock-
        screen drift is not simulated. OPT-IN + infra-gated
        (`OAFLOW_CITRIX_PIXEL_E2E=1`, macOS screen-recording + accessibility);
        never runs on default CI, and does not replace design-partner validation.

  # ------------------------ Windows-host window replay (mock-tested, roadmap)
  - id: win32-window-replay-roadmap
    claim: >-
      Windows hosts can replay window-scoped remote-display workflows (the
      Citrix/RDP client window on a Windows endpoint) through the same
      governed pixel contract already proven on macOS hosts.
    surfaces: [docs]
    tier: roadmap
    evidence:
      - path: tests/test_win32_window_client.py
        proves: >-
          MOCK-ONLY conformance: the win32 WindowClient implements the
          remote-display WindowClient seam (exact process/title/class
          selection with ambiguity halt, client-area coordinate mapping under
          per-monitor DPI awareness, PrintWindow-then-BitBlt capture fallback,
          focus-verification refusal, and the UIPI elevation guard) against a
          scripted Win32 API — never against a real Windows host.
      - path: docs/desktop/CITRIX_PIXEL.md
        kind: doc
        proves: >-
          The remote-display contract the client implements and the evidence
          ladder for qualifying it (Parallels/RDP client-window analog first,
          then design-partner Citrix).
    caveats:
      - >-
        NOT qualified: no counted end-to-end batch on a real Windows host or
        a real client window exists. The contract tests mock every Win32
        call; real DPI virtualization, UIPI, foreground-arbitration, and
        PrintWindow rendering behavior remain unproven until the
        Parallels/real-Windows validation procedure is executed and counted.

  # -------------------------------- OpenEMR head-to-head (field, not CI-reprod.)
  - id: openemr-field-benchmark
    claim: >-
      On the real third-party OpenEMR public demo, compiled replay went 20/20
      versus 10/10 for a computer-use agent, faster and with zero model calls.
    surfaces: [README.md, docs, website]
    tier: validating
    reproducibility: field
    evidence:
      - path: tests/test_openemr_benchmark.py
        proves: >-
          The CI-reproducible half: the note-saved verifier and the
          intent-not-coordinates task prompt that both benchmark arms use.
      - path: benchmark/openemr/BENCHMARK.md
        kind: benchmark
        proves: >-
          The field-test numbers, methodology, and cost caps for the 20-vs-10
          head-to-head run.
      - path: docs/showcase-openemr/FINDINGS.md
        kind: doc
        proves: >-
          The correctness-only field findings (fresh browsers, zero model
          calls, closed-loop scrolling).
    caveats:
      - >-
        FIELD TEST, NOT CI-reproducible: the head-to-head ran against a SHARED
        public demo that other users mutate and that resets daily; the sample
        is small (10 agent runs). Only the verifier + task-prompt units run in
        CI. `reproducibility: field` forbids ever labeling this `supported`.
