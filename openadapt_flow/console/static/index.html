<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenAdapt Flow — Operator Console</title>
<style>
  :root {
    --bg: #0f1216; --panel: #171c22; --panel2: #1d232b; --border: #2a323d;
    --text: #dbe2ea; --muted: #8b98a7; --accent: #4da3ff;
    --ok: #3fbf7f; --warn: #e0a53f; --err: #e05d5d; --chip: #232b35;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI",
         Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { display: flex; align-items: baseline; gap: 18px; padding: 14px 22px;
           background: var(--panel); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header nav a { color: var(--muted); text-decoration: none; margin-right: 14px;
                 padding-bottom: 2px; }
  header nav a.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  #mode { margin-left: auto; font-size: 12px; color: var(--muted); }
  #mode .rw { color: var(--warn); font-weight: 600; }
  main { padding: 20px 22px; max-width: 1200px; margin: 0 auto; }
  h2 { font-size: 15px; font-weight: 600; margin: 22px 0 10px; }
  h2:first-child { margin-top: 0; }
  table { width: 100%; border-collapse: collapse; background: var(--panel);
          border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
           vertical-align: top; }
  th { color: var(--muted); font-weight: 500; font-size: 12px;
       text-transform: uppercase; letter-spacing: .04em; background: var(--panel2); }
  tr:last-child td { border-bottom: none; }
  tr.rowlink { cursor: pointer; }
  tr.rowlink:hover td { background: var(--panel2); }
  .chip { display: inline-block; padding: 1px 8px; border-radius: 10px;
          font-size: 12px; background: var(--chip); color: var(--muted);
          white-space: nowrap; }
  .chip.ok { color: var(--ok); } .chip.warn { color: var(--warn); }
  .chip.err { color: var(--err); } .chip.info { color: var(--accent); }
  .muted { color: var(--muted); } .mono { font-family: ui-monospace, Menlo, monospace;
          font-size: 12px; }
  .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .card { background: var(--panel); border: 1px solid var(--border);
          border-radius: 6px; padding: 12px 16px; min-width: 150px; }
  .card .big { font-size: 22px; font-weight: 600; }
  .card .lbl { font-size: 12px; color: var(--muted); }
  .bar { height: 6px; border-radius: 3px; background: var(--chip); margin-top: 6px;
         overflow: hidden; }
  .bar > div { height: 100%; background: var(--ok); }
  pre.cmd { background: #0a0d10; border: 1px solid var(--border); border-radius: 6px;
            padding: 10px 12px; overflow-x: auto; font-size: 12px; color: #a9c7e8;
            white-space: pre-wrap; word-break: break-all; }
  .action { background: var(--panel); border: 1px solid var(--border);
            border-radius: 6px; padding: 12px 16px; margin-bottom: 10px; }
  .action h3 { margin: 0 0 4px; font-size: 14px; }
  .action p { margin: 4px 0 8px; color: var(--muted); font-size: 13px; }
  button { background: var(--chip); color: var(--text); border: 1px solid var(--border);
           border-radius: 5px; padding: 5px 12px; cursor: pointer; font-size: 13px; }
  button:hover { border-color: var(--accent); }
  button.danger { color: var(--warn); }
  button.copy { font-size: 12px; }
  .shots { display: flex; gap: 10px; margin: 6px 0; flex-wrap: wrap; }
  .shots figure { margin: 0; }
  .shots img { max-width: 380px; max-height: 260px; border: 1px solid var(--border);
               border-radius: 4px; display: block; }
  .shots figcaption { font-size: 11px; color: var(--muted); margin-top: 2px; }
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
           align-items: center; justify-content: center; z-index: 10; }
  #modal .box { background: var(--panel); border: 1px solid var(--border);
                border-radius: 8px; padding: 20px; max-width: 640px; width: 92%; }
  #modal input { width: 100%; margin: 4px 0 10px; padding: 6px 8px;
                 background: var(--bg); color: var(--text);
                 border: 1px solid var(--border); border-radius: 4px; }
  #modal .row { display: flex; gap: 10px; justify-content: flex-end; }
  details { margin: 4px 0; } summary { cursor: pointer; color: var(--muted); }
  .halt { border: 1px solid var(--err); border-radius: 6px; padding: 12px 16px;
          background: rgba(224,93,93,.06); margin-bottom: 12px; }
  .halt h3 { color: var(--err); margin: 0 0 6px; font-size: 14px; }
  select { background: var(--chip); color: var(--text); border: 1px solid var(--border);
           border-radius: 4px; padding: 4px 8px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>OpenAdapt Flow — Operator Console</h1>
  <nav>
    <a href="#/workflows" data-nav="workflows">Workflows</a>
    <a href="#/runs" data-nav="runs">Runs</a>
    <a href="#/skills" data-nav="skills">Skills</a>
  </nav>
  <span id="mode"></span>
</header>
<main id="main">Loading…</main>

<div id="modal"><div class="box">
  <h3 id="modal-title">Confirm action</h3>
  <p id="modal-desc" class="muted"></p>
  <p style="margin-bottom:4px">This will run:</p>
  <pre class="cmd" id="modal-cmd"></pre>
  <div id="modal-inputs"></div>
  <div class="row">
    <button onclick="closeModal()">Cancel</button>
    <button class="danger" id="modal-go">Run it</button>
  </div>
</div></div>

<script>
"use strict";
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const enc = encodeURIComponent;
let HEALTH = { read_only: true };

async function api(path, opts) {
  const r = await fetch(path, opts);
  const body = await r.json().catch(() => null);
  if (!r.ok) throw { status: r.status, body };
  return body;
}
const fmtTime = (t) => t ? t.replace("T", " ").slice(0, 19) : "—";
const pct = (n, d) => d ? Math.round(100 * n / d) : null;

function statusChip(s) {
  if (s.load_error) return `<span class="chip err" title="${esc(s.load_error)}">unreadable</span>`;
  if (s.certified) return `<span class="chip ok">certified${s.policy_name ? " · " + esc(s.policy_name) : ""}</span>`;
  if (s.certification_status === "failed") return `<span class="chip err">cert failed</span>`;
  if (s.certification_status === "expired") return `<span class="chip warn">cert expired</span>`;
  return `<span class="chip">uncertified</span>`;
}
function runChip(r) {
  if (!r) return `<span class="muted">never run</span>`;
  const c = r.success ? "ok" : (r.paused ? "warn" : "err");
  const label = r.success ? "success" : (r.paused ? "paused" : (r.halted ? "halted" : "failed"));
  return `<a href="#/runs/${enc(r.run_id)}"><span class="chip ${c}">${label}</span></a> <span class="muted">${fmtTime(r.started_at)}</span>`;
}

// ---------------------------------------------------------------- workflows
async function viewWorkflows() {
  const ws = await api("/api/workflows");
  const rows = ws.map((w) => `
    <tr class="rowlink" onclick="location.hash='#/workflows/${enc(w.id)}'">
      <td><strong>${esc(w.name || w.id)}</strong><br><span class="mono muted">${esc(w.id)}</span></td>
      <td class="mono">${esc(w.compiler_version || "—")}<br>
          <span class="muted">${w.content_digest ? esc(w.content_digest.slice(0, 12)) + "…" : ""}</span></td>
      <td>${statusChip(w)}</td>
      <td>${w.n_steps ?? "—"}</td>
      <td>${w.encrypted ? '<span class="chip info">encrypted</span>' : ""}
          ${w.contains_phi ? '<span class="chip warn">PHI</span>' : ""}</td>
      <td>${runChip(w.last_run)}</td>
    </tr>`).join("");
  return `<h2>Workflow bundles</h2>
    <table><tr><th>Bundle</th><th>Compiler / digest</th><th>Certification</th>
    <th>Steps</th><th>Flags</th><th>Last run</th></tr>${rows ||
    '<tr><td colspan="6" class="muted">no bundles found under the bundles root</td></tr>'}</table>`;
}

function covCard(label, num, den, unit) {
  const p = pct(num, den);
  return `<div class="card"><div class="lbl">${label}</div>
    <div class="big">${p === null ? "n/a" : p + "%"}</div>
    <div class="lbl">${den ? `${num} / ${den} ${unit}` : `no ${unit}`}</div>
    <div class="bar"><div style="width:${p ?? 0}%"></div></div></div>`;
}

async function viewWorkflowDetail(id, policy) {
  const d = await api(`/api/workflows/${id}` + (policy ? `?policy=${enc(policy)}` : ""));
  const s = d.summary;
  if (d.load_error) {
    return `<h2>${esc(s.id)}</h2><p class="chip err">unreadable</p>
      <pre class="cmd">${esc(d.load_error)}</pre>
      <p class="muted">Encrypted bundles need their key at load; the console never handles keys.</p>`;
  }
  const idc = d.identity_coverage, efc = d.effect_coverage;
  const cert = d.certification;
  const others = (await api("/api/workflows")).filter((w) => w.id !== s.id && !w.load_error);

  const stepRows = d.steps.map((st) => {
    let idb = "";
    if (st.identity_applicable) {
      idb = st.identity_armed
        ? '<span class="chip ok">armed</span>'
        : `<span class="chip err" title="${esc(st.identity_unarmed_reason || "")}">UNARMED</span>`;
    }
    const eff = st.n_effects
      ? `<span class="chip ok">${st.n_effects} contract${st.n_effects > 1 ? "s" : ""}</span>` +
        (st.effects.some((e) => e.needs_operator_confirmation)
          ? ' <span class="chip warn">needs confirmation</span>' : "")
      : (st.risk === "irreversible" ? '<span class="chip err">none</span>' : '<span class="muted">—</span>');
    return `<tr>
      <td class="mono">${esc(st.id)}</td>
      <td>${esc(st.intent)}<br><span class="muted mono">${esc(st.action)}${st.param ? " · param " + esc(st.param) : ""}${st.secret ? " · secret" : ""}</span></td>
      <td>${st.risk === "irreversible" ? '<span class="chip warn">irreversible</span>' : '<span class="muted">reversible</span>'}</td>
      <td>${idb}</td>
      <td>${eff}</td>
      <td>${st.n_postconditions || '<span class="muted">0</span>'}</td>
      <td class="mono">${st.confidence}</td>
    </tr>`;
  }).join("");

  const lintRows = d.lint.findings.map((f) => `
    <tr><td><span class="chip ${f.severity === "error" ? "err" : f.severity}">${esc(f.severity)}</span></td>
    <td class="mono">${esc(f.code)}</td><td class="mono">${esc(f.step_id || "")}</td>
    <td>${esc(f.message)}</td></tr>`).join("");

  let certHtml = `<p>Sealed: ${statusChip(s)} ${cert.sealed.certified_at ? `<span class="muted">at ${fmtTime(cert.sealed.certified_at)}</span>` : ""}
    ${cert.sealed.expires_at ? `<span class="muted">expires ${fmtTime(cert.sealed.expires_at)}</span>` : ""}</p>`;
  if (cert.live) {
    certHtml += `<p>Live evaluation vs <span class="mono">${esc(cert.live.policy_name)}</span>:
      <span class="chip ${cert.live.passed ? "ok" : "err"}">${cert.live.passed ? "PASS" : "FAIL"}</span></p>`;
    if (cert.live.violations.length) {
      certHtml += `<table><tr><th>Rule</th><th>Step</th><th>Reason</th></tr>` +
        cert.live.violations.map((v) => `<tr><td class="mono">${esc(v.rule)}</td>
        <td class="mono">${esc(v.step_id || "")}</td><td>${esc(v.reason)}</td></tr>`).join("") + "</table>";
    }
  } else if (cert.live_error) {
    certHtml += `<p class="muted">live evaluation unavailable: ${esc(cert.live_error)}</p>`;
  } else {
    certHtml += `<p class="muted">No certifying policy recorded. Evaluate live: </p>
      <p>${cert.available_policies.map((p) =>
        `<button onclick="location.hash='#/workflows/${enc(s.id)}?policy=${enc(p)}'">vs ${esc(p)}</button>`).join(" ")}</p>`;
  }

  const diffSel = others.length ? `
    <p>Compare against:
      <select id="diffsel">${others.map((o) =>
        `<option value="${enc(o.id)}">${esc(o.name || o.id)} (${esc(o.id)})</option>`).join("")}</select>
      <button onclick="location.hash='#/workflows/${enc(s.id)}/diff/'+$('#diffsel').value">Diff</button>
    </p>` : '<p class="muted">no other bundle to diff against</p>';

  const actions = await api(`/api/workflows/${id}/actions`);

  return `<h2>${esc(s.name)} <span class="muted mono">(${esc(s.id)})</span></h2>
    <div class="cards">
      ${covCard("Identity-armed steps", idc.armed, idc.applicable, "identity-applicable steps")}
      ${covCard("Effect contracts on consequential actions",
                efc.consequential_with_contract, efc.consequential, "irreversible steps")}
      <div class="card"><div class="lbl">Compiler</div><div class="big">${esc(s.compiler_version || "—")}</div>
        <div class="lbl mono">${s.content_digest ? esc(s.content_digest.slice(0, 16)) + "…" : ""}</div></div>
      <div class="card"><div class="lbl">Params</div>
        <div class="big">${Object.keys(d.params).length + Object.keys(d.param_specs).length ? Object.keys({...d.params, ...d.param_specs}).length : 0}</div>
        <div class="lbl">${esc(Object.keys({...d.params, ...d.param_specs}).join(", ") || "none")}</div></div>
    </div>
    ${idc.unarmed.length ? `<details><summary>${idc.unarmed.length} unarmed step(s)</summary>
      <table><tr><th>Step</th><th>Intent</th><th>Reason</th></tr>${idc.unarmed.map((u) =>
      `<tr><td class="mono">${esc(u.step_id)}</td><td>${esc(u.intent)}</td><td>${esc(u.reason)}</td></tr>`).join("")}</table></details>` : ""}
    <h2>Certification</h2>${certHtml}
    <h2>Compiled steps (${d.steps.length}${d.program_mode ? ", program mode" : ""})</h2>
    <table><tr><th>Id</th><th>Intent</th><th>Risk</th><th>Identity</th>
      <th>Effect contract</th><th>Postconds</th><th>Conf.</th></tr>${stepRows}</table>
    <h2>Lint (${d.lint.findings.length} finding(s))</h2>
    ${lintRows ? `<table><tr><th>Severity</th><th>Code</th><th>Step</th><th>Message</th></tr>${lintRows}</table>`
               : '<p class="muted">no coverage gaps found</p>'}
    <h2>Versions & diffs</h2>${diffSel}
    <h2>Actions</h2>${renderActions(actions, `/api/workflows/${id}/actions/`)}`;
}

async function viewDiff(aId, bId) {
  const d = await api(`/api/workflows/${aId}/diff/${bId}`);
  if (d.error) return `<h2>Diff</h2><p class="chip err">${esc(d.error)}</p>`;
  const meta = (s) => `<div class="card"><div class="lbl">${esc(s.id)}</div>
    <div class="big">${esc(s.name || "?")}</div>
    <div class="lbl mono">${esc(s.compiler_version || "")} · ${s.content_digest ? esc(s.content_digest.slice(0, 12)) + "…" : ""}</div>
    <div class="lbl">${fmtTime(s.created_at)} · ${s.certified ? "certified" : "uncertified"}</div></div>`;
  return `<h2>Diff <span class="mono muted">${esc(aId)} → ${esc(bId)}</span></h2>
    <div class="cards">${meta(d.a)}${meta(d.b)}</div>
    ${d.identical ? '<p class="chip ok">bundles are semantically identical (step-wise)</p>' : ""}
    ${d.steps_added.length ? `<h2>Steps only in ${esc(bId)}</h2><p class="mono">${d.steps_added.map(esc).join(", ")}</p>` : ""}
    ${d.steps_removed.length ? `<h2>Steps only in ${esc(aId)}</h2><p class="mono">${d.steps_removed.map(esc).join(", ")}</p>` : ""}
    ${d.steps_changed.length ? `<h2>Changed steps</h2><table><tr><th>Step</th><th>Fields</th></tr>${
      d.steps_changed.map((c) => `<tr><td class="mono">${esc(c.step_id)}</td><td class="mono">${c.fields.map(esc).join(", ")}</td></tr>`).join("")}</table>` : ""}
    ${d.params_changed ? "<p class='chip warn'>parameter defaults differ</p>" : ""}
    <p><a href="#/workflows/${enc(aId)}">← back</a></p>`;
}

// --------------------------------------------------------------------- runs
async function viewRuns() {
  const rs = await api("/api/runs");
  const rows = rs.map((r) => {
    const st = r.load_error ? '<span class="chip err">unreadable</span>'
      : r.success ? '<span class="chip ok">success</span>'
      : r.paused ? '<span class="chip warn">paused</span>'
      : r.halted ? '<span class="chip err">halted</span>'
      : '<span class="chip err">failed</span>';
    return `<tr class="rowlink" onclick="location.hash='#/runs/${enc(r.id)}'">
      <td class="mono">${esc(r.id)}</td><td>${esc(r.workflow_name || "—")}</td>
      <td>${fmtTime(r.started_at)}</td><td>${st}${r.approved ? ' <span class="chip info">approved</span>' : ""}</td>
      <td>${r.n_results}${r.n_failed ? ` <span class="chip err">${r.n_failed} failed</span>` : ""}</td>
      <td>${r.identity_applicable_steps != null ? `${r.identity_armed_steps}/${r.identity_applicable_steps}` : "—"}</td>
      <td>${r.total_ms != null ? (r.total_ms / 1000).toFixed(1) + "s" : "—"}</td></tr>`;
  }).join("");
  return `<h2>Run history</h2>
    <table><tr><th>Run</th><th>Workflow</th><th>Started</th><th>Status</th>
    <th>Steps</th><th>Identity armed</th><th>Duration</th></tr>${rows ||
    '<tr><td colspan="7" class="muted">no runs found under the runs root</td></tr>'}</table>`;
}

function shot(runId, rel, cap) {
  if (!rel) return "";
  return `<figure><img loading="lazy" src="/api/runs/${enc(runId)}/artifact?path=${enc(rel)}">
    <figcaption>${esc(cap)}: ${esc(rel)}</figcaption></figure>`;
}

async function viewRunDetail(id) {
  const d = await api(`/api/runs/${id}`);
  const s = d.summary;
  if (s.load_error && !d.report) {
    return `<h2>${esc(s.id)}</h2><pre class="cmd">${esc(s.load_error)}</pre>`;
  }
  const actions = await api(`/api/runs/${id}/actions`);

  let haltHtml = "";
  if (d.halt) {
    haltHtml = `<div class="halt"><h3>HALT — ${esc(d.halt.intent || d.halt.state_id)}</h3>
      <p>${esc(d.halt.reason)}</p>
      ${d.halt.observed_texts.length ? `<p class="muted">Observed on screen (PHI-scrubbed):</p>
        <p>${d.halt.observed_texts.map((t) => `<span class="chip">${esc(t)}</span>`).join(" ")}</p>` : ""}
      ${d.halt.completed_intents.length ? `<details><summary>${d.halt.completed_intents.length} step(s) completed before the halt</summary>
        <p class="muted">${d.halt.completed_intents.map(esc).join(" → ")}</p></details>` : ""}
    </div>`;
  }
  let pauseHtml = "";
  if (d.pending_escalation) {
    const p = d.pending_escalation;
    pauseHtml = `<div class="halt" style="border-color:var(--warn)">
      <h3 style="color:var(--warn)">PAUSED — awaiting operator (${esc(p.category || "")})</h3>
      <p>${esc(p.reason || "")}</p>
      ${(p.proposed_options || []).length ? `<p class="muted">Proposed: ${p.proposed_options.map(esc).join(" · ")}</p>` : ""}
      <p class="muted">resumes from step index ${p.resume_from_index} · status: ${esc(p.status)}</p></div>`;
  } else if (d.pending_escalation_encrypted) {
    pauseHtml = `<p class="chip warn">paused (escalation record is encrypted at rest)</p>`;
  }
  if (d.approval) {
    pauseHtml += `<p><span class="chip info">approved</span> by <strong>${esc(d.approval.approver)}</strong>
      at ${fmtTime(d.approval.approved_at)}${d.approval.resolution ? ` — “${esc(d.approval.resolution)}”` : ""}</p>`;
  }

  const timeline = (d.timeline || []).map((t) => {
    const st = t.skipped ? '<span class="chip">skipped</span>'
      : t.ok ? '<span class="chip ok">ok</span>'
      : t.safety_halt ? '<span class="chip err">SAFETY HALT</span>'
      : '<span class="chip err">failed</span>';
    const idv = t.identity ? `<span class="chip ${t.identity.status === "verified" ? "ok" :
        t.identity.status === "mismatch" ? "err" : "warn"}"
        title="mode ${esc(t.identity.mode)}">${esc(t.identity.status)}</span>` : "";
    const eff = t.effect_verified === true ? '<span class="chip ok">effect confirmed</span>'
      : t.effect_verified === false ? '<span class="chip err">effect refused</span>'
      : t.effect_approved_unverified ? '<span class="chip warn">approved unverified</span>' : "";
    return `<tr><td class="mono">${esc(t.step_id)}</td>
      <td>${esc(t.intent)}${t.error ? `<br><span class="muted">${esc(t.error)}</span>` : ""}
        ${t.effect_results.length ? `<details><summary>effect verdicts</summary><p class="mono muted">${t.effect_results.map(esc).join("<br>")}</p></details>` : ""}
        ${(t.before_png || t.after_png) ? `<details><summary>screenshots</summary><div class="shots">
          ${shot(s.id, t.before_png, "before")}${shot(s.id, t.after_png, "after")}</div></details>` : ""}</td>
      <td>${st}</td><td>${idv}</td><td>${eff}</td>
      <td class="mono">${t.resolution_rung ? esc(t.resolution_rung) : "—"}</td>
      <td>${(t.elapsed_ms / 1000).toFixed(2)}s</td></tr>`;
  }).join("");

  return `<h2>Run ${esc(s.id)} <span class="muted">— ${esc(s.workflow_name || "")}</span></h2>
    <div class="cards">
      <div class="card"><div class="lbl">Outcome</div><div class="big">${
        s.success ? "success" : s.paused ? "paused" : s.halted ? "halted" : "failed"}</div>
        <div class="lbl">${fmtTime(s.started_at)}</div></div>
      <div class="card"><div class="lbl">Identity armed</div>
        <div class="big">${s.identity_applicable_steps != null ? `${s.identity_armed_steps}/${s.identity_applicable_steps}` : "n/a"}</div>
        <div class="lbl">applicable steps</div></div>
      <div class="card"><div class="lbl">Egress</div>
        <div class="big">${s.screenshots_may_leave_box ? "possible" : "none"}</div>
        <div class="lbl">${s.screenshots_may_leave_box ? "model grounding enabled" : "fully local replay"}</div></div>
      <div class="card"><div class="lbl">Bundle digest</div>
        <div class="big mono" style="font-size:14px">${s.bundle_content_digest ? esc(s.bundle_content_digest.slice(0, 16)) + "…" : "—"}</div>
        <div class="lbl">${d.manifest ? esc(d.manifest.bundle_dir || "") : ""}</div></div>
    </div>
    ${haltHtml}${pauseHtml}
    <h2>Timeline (${(d.timeline || []).length} steps)</h2>
    <table><tr><th>Step</th><th>Intent / evidence</th><th>Status</th><th>Identity</th>
    <th>Effect</th><th>Rung</th><th>Elapsed</th></tr>${timeline}</table>
    ${d.checkpoints.length ? `<details><summary>${d.checkpoints.length} durable checkpoint(s)</summary>
      <table><tr><th>File</th><th>Step</th><th>At</th></tr>${d.checkpoints.map((c) =>
      `<tr><td class="mono">${esc(c.file)}</td><td class="mono">${esc(c.step_id || "")}</td><td>${fmtTime(c.created_at)}</td></tr>`).join("")}</table></details>` : ""}
    <h2>Actions</h2>${renderActions(actions, `/api/runs/${id}/actions/`)}`;
}

// ------------------------------------------------------------------- skills
async function viewSkills() {
  const libs = await api("/api/skills");
  if (!libs.length) return `<h2>Skill libraries</h2>
    <p class="muted">No skills.json found under the scanned roots. A library is
    created by <span class="mono">openadapt-flow teach</span> next to the updated bundle.</p>`;
  return `<h2>Skill libraries</h2>` + libs.map((lib) => {
    if (lib.error) return `<p class="chip err">${esc(lib.path)}: ${esc(lib.error)}</p>`;
    return `<h2 class="mono" style="font-weight:400">${esc(lib.path)}</h2>` +
      lib.skills.map((sk) => `
      <table><tr><th colspan="6">${esc(sk.skill_id)}</th></tr>
      <tr><th>Version</th><th>Status</th><th>Score</th><th>Provenance</th><th>Note</th><th>Actions</th></tr>
      ${sk.versions.map((v) => `<tr>
        <td>v${v.version}${v.parent_version != null ? `<span class="muted"> ← v${v.parent_version}</span>` : ""}</td>
        <td><span class="chip ${v.status === "active" ? "ok" : v.status === "candidate" ? "info" : v.status === "rolled_back" ? "err" : ""}">${esc(v.status)}</span></td>
        <td>${v.validation_score != null ? v.validation_score : "—"}</td>
        <td class="muted">${fmtTime(v.created_at)} · ${v.n_traces} trace(s)</td>
        <td class="muted">${esc(v.note || v.reason || "")}</td>
        <td>${v.status === "candidate" ? `<button onclick='skillAction(${JSON.stringify(lib.path)}, ${JSON.stringify(sk.skill_id)}, ${v.version}, "promote")'>Promote</button>` : ""}
            ${v.status !== "rolled_back" ? `<button class="danger" onclick='skillAction(${JSON.stringify(lib.path)}, ${JSON.stringify(sk.skill_id)}, ${v.version}, "rollback")'>Roll back</button>` : ""}</td>
      </tr>`).join("")}</table>`).join("");
  }).join("");
}

// ---------------------------------------------------------------- actions UI
function renderActions(actions, postBase) {
  if (!actions.length) return '<p class="muted">no governance actions apply here</p>';
  window._actions = { list: actions, postBase };
  return actions.map((a, i) => `<div class="action">
    <h3>${esc(a.title)} ${a.mutating ? "" : '<span class="chip">read-only</span>'}
        ${a.executable ? "" : '<span class="chip warn">copy to terminal</span>'}</h3>
    <p>${esc(a.description)}</p>
    <pre class="cmd">${esc(a.command)}</pre>
    <button class="copy" onclick="navigator.clipboard.writeText(_actions.list[${i}].command)">Copy command</button>
    ${a.executable ? `<button ${HEALTH.read_only && a.mutating ? 'title="server is read-only; restart with --allow-actions"' : ""}
        onclick="confirmAction(${i})">${a.mutating ? "Run…" : "Evaluate…"}</button>` : ""}
  </div>`).join("");
}

let _pendingExec = null;
function confirmAction(i) {
  const a = window._actions.list[i];
  $("#modal-title").textContent = a.title;
  $("#modal-desc").textContent = HEALTH.read_only && a.mutating
    ? "Server is READ-ONLY: this will be refused; the command below is what you would run."
    : a.description;
  $("#modal-cmd").textContent = a.command;
  let inputs = "";
  if (a.id === "approve") {
    inputs = `<label>Approver identity<input id="in-approver" placeholder="defaults to OS user"></label>
      <label>Resolution<input id="in-resolution" placeholder="what you decided to do"></label>`;
  }
  $("#modal-inputs").innerHTML = inputs;
  _pendingExec = async () => {
    const payload = {};
    if (a.id === "approve") {
      payload.approver = ($("#in-approver") || {}).value || "";
      payload.resolution = ($("#in-resolution") || {}).value || "";
    }
    try {
      const res = await api(window._actions.postBase + a.id, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      alert(`${a.id}: exit ${res.returncode}\n\n${res.stdout || ""}${res.stderr || ""}`);
      route();
    } catch (e) {
      const det = e.body && e.body.detail;
      alert(det && det.error ? `${det.error}\n\nCopy instead:\n${det.command}` : JSON.stringify(det || e));
    }
    closeModal();
  };
  $("#modal").style.display = "flex";
}
async function skillAction(library, skillId, version, actionId) {
  const specs = { postBase: `/api/skills/${enc(skillId)}/actions/` };
  const reason = actionId === "rollback" ? prompt("Rollback reason:", "rolled back from operator console") : null;
  if (actionId === "rollback" && reason === null) return;
  try {
    const res = await api(specs.postBase + actionId, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ library, version, reason: reason || "" }),
    });
    alert(`${actionId}: exit ${res.returncode}\n${res.stdout || res.stderr || ""}`);
    route();
  } catch (e) {
    const det = e.body && e.body.detail;
    alert(det && det.error ? `${det.error}\n\nRun instead:\n${det.command}` : JSON.stringify(det || e));
  }
}
function closeModal() { $("#modal").style.display = "none"; _pendingExec = null; }
$("#modal-go").addEventListener("click", () => _pendingExec && _pendingExec());

// ------------------------------------------------------------------- router
async function route() {
  const hash = location.hash || "#/workflows";
  const [path, query] = hash.slice(2).split("?");
  const parts = path.split("/").map(decodeURIComponent);
  const nav = parts[0] || "workflows";
  document.querySelectorAll("[data-nav]").forEach((a) =>
    a.classList.toggle("active", a.dataset.nav === nav));
  const main = $("#main");
  main.innerHTML = '<p class="muted">Loading…</p>';
  try {
    let html;
    const diffIdx = parts.indexOf("diff");
    if (nav === "workflows" && diffIdx > 0) {
      html = await viewDiff(enc(parts.slice(1, diffIdx).join("/")), enc(parts.slice(diffIdx + 1).join("/")));
    } else if (nav === "workflows" && parts.length > 1) {
      const q = new URLSearchParams(query || "");
      html = await viewWorkflowDetail(enc(parts.slice(1).join("/")), q.get("policy"));
    } else if (nav === "runs" && parts.length > 1) {
      html = await viewRunDetail(enc(parts.slice(1).join("/")));
    } else if (nav === "runs") {
      html = await viewRuns();
    } else if (nav === "skills") {
      html = await viewSkills();
    } else {
      html = await viewWorkflows();
    }
    main.innerHTML = html;
  } catch (e) {
    main.innerHTML = `<p class="chip err">error</p><pre class="cmd">${esc(JSON.stringify(e.body || String(e), null, 2))}</pre>`;
  }
}
window.addEventListener("hashchange", route);

(async () => {
  try {
    HEALTH = await api("/api/health");
    $("#mode").innerHTML = HEALTH.read_only
      ? 'read-only · v' + esc(HEALTH.version)
      : '<span class="rw">actions enabled</span> · v' + esc(HEALTH.version);
  } catch { $("#mode").textContent = "api unreachable"; }
  route();
})();
</script>
</body>
