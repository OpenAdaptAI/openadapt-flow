[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openadapt-flow"
version = "0.1.0"
description = "Demonstration compiler: record a desktop workflow once, compile it into a deterministic, self-healing, locally-run script."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "OpenAdapt.AI" }]
dependencies = [
    "pydantic>=2.5",
    "numpy>=1.26",
    "opencv-python-headless>=4.9",
    "pillow>=10.0",
    "imagehash>=4.3",
    "rapidocr-onnxruntime>=1.3",
    # The reference backend and the CLI's demo-record/replay self-serve
    # path drive a Playwright browser; core, not a dev extra.
    "playwright>=1.44",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-timeout>=2.2",
    # Benchmark harness: agent baseline (anthropic) + chart rendering.
    "anthropic>=0.40",
    "matplotlib>=3.8",
    # WindowsBackend tests (mock WAA server).
    "requests>=2.31",
]
grounder = ["anthropic>=0.40"]
# Open GUI-grounding rung (GUI-Owl-1.5, MIT). Two serving backends:
#   grounder-mlx  — local Apple-Silicon serving via mlx-vlm (on-prem, no API).
#   grounder-http — OpenAI-compatible endpoint (vLLM/SGLang, the GPU deploy
#                   path for the 8B checkpoint).
# Neither is exercised by the unit suite; the composition is measured with an
# injected transport / faithful mock (docs/grounding_rung.md).
grounder-mlx = ["mlx-vlm>=0.6"]
grounder-http = ["requests>=2.31"]
# WindowsBackend: HTTP client for the WAA (Windows Agent Arena) server.
windows = ["requests>=2.31"]

[project.scripts]
openadapt-flow = "openadapt_flow.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["openadapt_flow"]

[tool.pytest.ini_options]
testpaths = ["tests"]
timeout = 600
