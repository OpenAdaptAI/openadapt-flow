[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openadapt-flow"
version = "0.1.0"
description = "Demonstration compiler: record a desktop workflow once, compile it into a deterministic, self-healing, locally-run script."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "OpenAdapt.AI" }]
dependencies = [
    "pydantic>=2.5",
    "numpy>=1.26",
    "opencv-python-headless>=4.9",
    "pillow>=10.0",
    "imagehash>=4.3",
    "rapidocr-onnxruntime>=1.3",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-timeout>=2.2", "playwright>=1.44"]
grounder = ["anthropic>=0.40"]

[project.scripts]
openadapt-flow = "openadapt_flow.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["openadapt_flow"]

[tool.pytest.ini_options]
testpaths = ["tests"]
timeout = 600
